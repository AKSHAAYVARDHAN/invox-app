<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invox - Fuel Curiosity, Expand Consciousness</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
      /* === RESPONSIVE GLOBAL RESETS === */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }
      #root {
        overflow-x: hidden;
      }
      .pseudo-fullscreen {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 2147483647 !important;
        background-color: black !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
      }
      .pseudo-fullscreen video {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
      }
      @keyframes wave {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1); }
      }
      .wave-bar {
        animation: wave 1.2s ease-in-out infinite;
        transform-origin: bottom;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeInUp {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      .animated-gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(90deg, #E50914, #0052FF);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
        pointer-events: none;
      }
      .animated-gradient-border:hover::before {
        opacity: 1;
      }
      .blur-background {
        filter: blur(8px);
        transition: filter 0.3s ease-in-out;
      }
      pre > code.hljs {
        background-color: transparent !important;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(15px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-message-in {
        animation: slideInUp 0.35s ease-out forwards;
      }
    </style>
  </head>
  <body class="bg-invox-dark text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
